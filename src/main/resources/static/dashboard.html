<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Gestión de Portes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow border-bottom border-secondary">
        <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6" href="#">
            <i class="fas fa-truck-moving me-2"></i> Logística
        </a>
        <button class="navbar-toggler position-absolute d-md-none collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="navbar-nav w-100 d-flex flex-row justify-content-end px-3">
            <div class="nav-item text-nowrap d-flex align-items-center">
                <span class="text-light me-3" id="userNameDisplay">Invitado</span>
                <a class="nav-link px-3 btn btn-outline-secondary btn-sm" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i> Salir
                </a>
            </div>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse border-end border-secondary">
                <div class="position-sticky pt-3 sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" id="btnDashboard" href="#">
                                <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="btnEstadisticas" href="#">
                                <i class="fas fa-chart-pie me-2"></i> Estadísticas
                            </a>
                        </li>
                    </ul>
                    
                    <h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-light opacity-75 text-uppercase">
                        <span>Administración</span>
                    </h6>
                    <ul class="nav flex-column mb-2">
                        <li class="nav-item">
                            <a class="nav-link" id="btnUsuarios" href="#">
                                <i class="fas fa-users me-2"></i> Gestión Usuarios
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="mt-auto p-3 text-center border-top border-secondary">
                    <p class="text-light small mb-0 opacity-50" style="font-size: 0.75rem;">
                        © Antonio Espiga Noriega<br>1º DAW
                    </p>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4" id="mainContent">
                <!-- El contenido se cargará dinámicamente aquí -->
                <div id="viewContainer">
                    <div class="d-flex justify-content-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal para Crear/Editar Porte -->
    <div class="modal fade" id="porteModal" tabindex="-1" aria-labelledby="porteModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="porteModalLabel">Detalle del Porte</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="porteForm">
                        <input type="hidden" id="porteId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Camión (Matrícula)</label>
                                <select class="form-select bg-dark text-light border-secondary" id="porteCamion" required></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Producto</label>
                                <select class="form-select bg-dark text-light border-secondary" id="porteProducto" required></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fecha</label>
                                <input type="date" class="form-control bg-dark text-light border-secondary" id="porteFecha" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Estado</label>
                                <select class="form-select bg-dark text-light border-secondary" id="porteEstado" required>
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="Realizado">Realizado</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Origen</label>
                                <select class="form-select bg-dark text-light border-secondary" id="porteOrigen" required>
                                    <option value="Proveedor 1">Proveedor 1</option>
                                    <option value="Proveedor 2">Proveedor 2</option>
                                    <option value="Proveedor 3">Proveedor 3</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Destino</label>
                                <select class="form-select bg-dark text-light border-secondary" id="porteDestino" required>
                                    <option value="Distribuidora">Distribuidora</option>
                                    <option value="Cliente Final">Cliente Final</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarPorte()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para Usuarios -->
    <div class="modal fade" id="usuarioModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Nuevo Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="usuarioForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="uUsername" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control bg-dark text-light border-secondary" id="uPassword" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="uNombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control bg-dark text-light border-secondary" id="uEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol</label>
                            <select class="form-select bg-dark text-light border-secondary" id="uRole">
                                <option value="usuario">Usuario Estándar</option>
                                <option value="administrador">Administrador</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarUsuario()">Crear Usuario</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
